name: Nightly media map update

on:
  schedule:
    - cron: "15 2 * * *"   # 02:15 UTC nightly; odd minute avoids the on-the-hour crush
  workflow_dispatch: {}     # manual run button for testing

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python update_articles.py

      - name: Commit changes if any
        run: |
          git config user.name "media-map-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/journalists.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Nightly article refresh $(date -u +%F)"
          git push
